<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - CRM 系统</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1 class="login-title">CRM 系统</h1>
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label class="form-label required" for="username">用户名</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-input"
            placeholder="请输入用户名"
            required
          >
        </div>
        <div class="form-group">
          <label class="form-label required" for="password">密码</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="请输入密码"
            required
          >
        </div>
        <button type="submit" class="btn btn-primary btn-lg">登录</button>
      </form>
      <div style="text-align: center; margin-top: 16px; color: #595959; font-size: 12px;">
        <p>演示账号：admin / admin123</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // 演示用简单验证
      if (username === 'admin' && password === 'admin123') {
        // 保存登录状态
        localStorage.setItem('currentUser', JSON.stringify({
          username: 'admin',
          name: '管理员'
        }));
        window.location.href = 'dashboard.html';
      } else {
        alert('用户名或密码错误，请使用演示账号：admin / admin123');
      }
    });
  </script>
</body>
</html>
