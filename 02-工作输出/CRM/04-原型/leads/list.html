<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>线索列表 - CRM 系统</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="app-layout">
    <!-- 左侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">CRM 系统</div>
      </div>

      <nav class="sidebar-nav">
        <!-- 工作台 -->
        <a href="../dashboard.html" class="sidebar-menu-item">
          <span class="sidebar-menu-icon">📊</span>
          <span>工作台</span>
        </a>

        <!-- 销售管理（二级菜单） -->
        <div class="sidebar-menu-group">
          <div class="sidebar-menu-item" style="padding-left: 20px; font-weight: 600;">
            <span class="sidebar-menu-icon">💼</span>
            <span>销售管理</span>
          </div>
          <div class="sidebar-submenu">
            <a href="list.html" class="sidebar-menu-item active">
              <span>线索管理</span>
            </a>
          </div>
        </div>

        <!-- 设置 -->
        <a href="#" class="sidebar-menu-item" style="margin-top: auto;">
          <span class="sidebar-menu-icon">⚙️</span>
          <span>设置</span>
        </a>
      </nav>

      <!-- 用户信息 -->
      <div class="sidebar-user">
        <div class="user-avatar" title="管理员">管</div>
        <div class="user-info">
          <div class="user-name">管理员</div>
          <div class="user-role">超级管理员</div>
        </div>
        <a href="../index.html" class="logout-btn" title="退出登录">退出</a>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <div class="top-bar">
        <div class="top-bar-title">线索管理</div>
        <div class="top-bar-actions">
          <span style="color: var(--text-secondary); font-size: 13px;">2026 年 4 月 13 日 星期一</span>
        </div>
      </div>

      <!-- 页面内容 -->
      <div class="container-fluid">
        <!-- 面包屑 -->
        <div class="breadcrumb">
          <a href="../dashboard.html">工作台</a>
          <span class="breadcrumb-separator">/</span>
          <span>销售管理</span>
          <span class="breadcrumb-separator">/</span>
          <span>线索列表</span>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
          <h2 style="font-size: 18px; font-weight: 600;">线索列表</h2>
          <div class="toolbar-right">
            <a href="import.html" class="btn btn-default">导入</a>
            <a href="create.html" class="btn btn-primary">+ 新建线索</a>
          </div>
        </div>

        <!-- 搜索筛选栏 -->
        <div class="search-filter-bar">
          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              class="form-input"
              placeholder="搜索姓名或公司名称..."
              style="flex: 1;"
            >
            <button class="btn btn-primary" onclick="handleSearch()">搜索</button>
          </div>
          <select id="statusFilter" class="form-select" onchange="handleFilter()">
            <option value="all">全部状态</option>
            <option value="新建">新建</option>
            <option value="已联系">已联系</option>
            <option value="有意向">有意向</option>
            <option value="已评估">已评估</option>
            <option value="已转换">已转换</option>
            <option value="已关闭">已关闭</option>
          </select>
          <select id="sourceFilter" class="form-select" onchange="handleFilter()">
            <option value="all">全部来源</option>
            <option value="网站">网站</option>
            <option value="电话">电话</option>
            <option value="推荐">推荐</option>
            <option value="活动">活动</option>
            <option value="其他">其他</option>
          </select>
        </div>

        <!-- 表格 -->
        <div class="card" style="padding: 0;">
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th style="width: 40px;">
                    <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                  </th>
                  <th>姓名</th>
                  <th>职位</th>
                  <th>公司</th>
                  <th>联系方式</th>
                  <th>状态</th>
                  <th>来源</th>
                  <th>评级</th>
                  <th>负责人</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="leadsTableBody">
                <!-- 数据由 JS 渲染 -->
              </tbody>
            </table>
          </div>

          <!-- 分页 -->
          <div style="padding: 16px 24px;">
            <div class="pagination">
              <button onclick="goToPage(1)" id="prevPage">首页</button>
              <button class="active">1</button>
              <button>2</button>
              <button>3</button>
              <button onclick="goToPage(2)" id="nextPage">末页</button>
            </div>
          </div>
        </div>

        <!-- 批量操作栏（默认隐藏） -->
        <div class="batch-action-bar" id="batchActionBar" style="display: none;">
          <div class="selected-count">已选择 <span id="selectedCount">0</span> 条线索</div>
          <div class="actions">
            <button class="btn btn-default" onclick="handleBatchExport()">导出</button>
            <button class="btn btn-default" onclick="handleBatchAssign()">分配</button>
            <button class="btn btn-danger" onclick="handleBatchDelete()">删除</button>
            <button class="btn btn-default" onclick="cancelBatch()">取消</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 分配弹窗 -->
  <div class="modal-overlay" id="assignModal" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">批量分配</h3>
        <button class="modal-close" onclick="closeAssignModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label required">选择负责人</label>
          <select id="assignToUser" class="form-select">
            <option value="">请选择负责人</option>
            <option value="1">管理员</option>
            <option value="2">销售员 A</option>
            <option value="3">销售员 B</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeAssignModal()">取消</button>
        <button class="btn btn-primary" onclick="confirmAssign()">确定</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    let selectedLeads = new Set();
    let currentFilter = { search: '', status: 'all', source: 'all' };

    // 渲染线索列表
    function renderLeads() {
      const leads = getLeads(currentFilter);
      const tbody = document.getElementById('leadsTableBody');

      if (leads.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="10" class="empty-state" style="padding: 60px 20px;">
              <div class="empty-state-icon">📭</div>
              <div class="empty-state-text">暂无数据</div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = leads.map(lead => `
        <tr>
          <td>
            <input type="checkbox" data-id="${lead.id}" onchange="toggleLead('${lead.id}')" ${selectedLeads.has(lead.id) ? 'checked' : ''}>
          </td>
          <td><a href="detail.html?id=${lead.id}">${lead.lastName}${lead.firstName}</a></td>
          <td>${lead.title || '-'}</td>
          <td>${lead.company || '-'}</td>
          <td>${lead.mobile || lead.phone || '-'}</td>
          <td><span class="tag ${statusMap[lead.status]}">${lead.status}</span></td>
          <td>${lead.source}</td>
          <td><span class="tag ${ratingMap[lead.rating]}">${lead.rating}</span></td>
          <td>${lead.assignedTo}</td>
          <td>
            <div class="actions">
              <a href="detail.html?id=${lead.id}" class="btn btn-sm btn-default">查看</a>
              <a href="edit.html?id=${lead.id}" class="btn btn-sm btn-default">编辑</a>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // 全选/取消全选
    function toggleSelectAll() {
      const checkbox = document.getElementById('selectAll');
      const leads = getLeads(currentFilter);

      if (checkbox.checked) {
        leads.forEach(lead => selectedLeads.add(lead.id));
      } else {
        leads.forEach(lead => selectedLeads.delete(lead.id));
      }

      renderLeads();
      updateBatchActionBar();
    }

    // 单选
    function toggleLead(id) {
      if (selectedLeads.has(id)) {
        selectedLeads.delete(id);
      } else {
        selectedLeads.add(id);
      }
      renderLeads();
      updateBatchActionBar();
    }

    // 更新批量操作栏状态
    function updateBatchActionBar() {
      const batchBar = document.getElementById('batchActionBar');
      const countSpan = document.getElementById('selectedCount');
      const checkbox = document.getElementById('selectAll');

      countSpan.textContent = selectedLeads.size;

      if (selectedLeads.size > 0) {
        batchBar.style.display = 'flex';
        checkbox.checked = selectedLeads.size === getLeads(currentFilter).length;
      } else {
        batchBar.style.display = 'none';
        checkbox.checked = false;
      }
    }

    // 取消批量选择
    function cancelBatch() {
      selectedLeads.clear();
      document.getElementById('selectAll').checked = false;
      renderLeads();
      updateBatchActionBar();
    }

    // 搜索
    function handleSearch() {
      currentFilter.search = document.getElementById('searchInput').value.trim();
      renderLeads();
      selectedLeads.clear();
      updateBatchActionBar();
    }

    // 筛选
    function handleFilter() {
      currentFilter.status = document.getElementById('statusFilter').value;
      currentFilter.source = document.getElementById('sourceFilter').value;
      renderLeads();
      selectedLeads.clear();
      updateBatchActionBar();
    }

    // 批量分配
    function handleBatchAssign() {
      document.getElementById('assignModal').style.display = 'flex';
    }

    function closeAssignModal() {
      document.getElementById('assignModal').style.display = 'none';
      document.getElementById('assignToUser').value = '';
    }

    function confirmAssign() {
      const userId = document.getElementById('assignToUser').value;
      if (!userId) {
        alert('请选择负责人');
        return;
      }
      showMessage(`已将 ${selectedLeads.size} 条线索分配给负责人`);
      closeAssignModal();
      cancelBatch();
    }

    // 批量导出
    function handleBatchExport() {
      showMessage(`已导出 ${selectedLeads.size} 条线索为 CSV 文件`);
      cancelBatch();
    }

    // 批量删除
    function handleBatchDelete() {
      if (confirm(`确定要删除选中的 ${selectedLeads.size} 条线索吗？此操作可以恢复。`)) {
        showMessage(`已删除 ${selectedLeads.size} 条线索`);
        cancelBatch();
      }
    }

    // 分页
    function goToPage(page) {
      showMessage(`跳转到第 ${page} 页`);
    }

    // 搜索框回车事件
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        handleSearch();
      }
    });

    // 初始化
    renderLeads();
  </script>
</body>
</html>
