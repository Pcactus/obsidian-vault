<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑线索 - CRM 系统</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="app-layout">
    <!-- 左侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">CRM 系统</div>
      </div>

      <nav class="sidebar-nav">
        <!-- 工作台 -->
        <a href="../dashboard.html" class="sidebar-menu-item">
          <span class="sidebar-menu-icon">📊</span>
          <span>工作台</span>
        </a>

        <!-- 销售管理（二级菜单） -->
        <div class="sidebar-menu-group">
          <div class="sidebar-menu-item" style="padding-left: 20px; font-weight: 600;">
            <span class="sidebar-menu-icon">💼</span>
            <span>销售管理</span>
          </div>
          <div class="sidebar-submenu">
            <a href="list.html" class="sidebar-menu-item active">
              <span>线索管理</span>
            </a>
          </div>
        </div>

        <!-- 设置 -->
        <a href="#" class="sidebar-menu-item" style="margin-top: auto;">
          <span class="sidebar-menu-icon">⚙️</span>
          <span>设置</span>
        </a>
      </nav>

      <!-- 用户信息 -->
      <div class="sidebar-user">
        <div class="user-avatar" title="管理员">管</div>
        <div class="user-info">
          <div class="user-name">管理员</div>
          <div class="user-role">超级管理员</div>
        </div>
        <a href="../index.html" class="logout-btn" title="退出登录">退出</a>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <div class="top-bar">
        <div class="top-bar-title">编辑线索</div>
        <div class="top-bar-actions">
          <span style="color: var(--text-secondary); font-size: 13px;">2026 年 4 月 13 日 星期一</span>
        </div>
      </div>

      <!-- 页面内容 -->
      <div class="container">
        <!-- 面包屑 -->
        <div class="breadcrumb">
          <a href="../dashboard.html">工作台</a>
          <span class="breadcrumb-separator">/</span>
          <span>销售管理</span>
          <span class="breadcrumb-separator">/</span>
          <a href="list.html">线索列表</a>
          <span class="breadcrumb-separator">/</span>
          <span>编辑线索</span>
        </div>

        <div class="card">
          <div class="card-header">
            <h3 class="card-title">编辑线索</h3>
          </div>

          <form id="editLeadForm">
            <!-- 基本信息 -->
            <div class="detail-section">
              <h4 class="detail-section-title">基本信息</h4>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label required" for="firstName">姓</label>
                  <input type="text" id="firstName" name="firstName" class="form-input" required placeholder="请输入姓" maxlength="50" value="伟">
                </div>
                <div class="form-group">
                  <label class="form-label required" for="lastName">名</label>
                  <input type="text" id="lastName" name="lastName" class="form-input" required placeholder="请输入名" maxlength="50" value="张">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="title">职位</label>
                  <input type="text" id="title" name="title" class="form-input" placeholder="请输入职位/头衔" maxlength="50" value="市场总监">
                </div>
                <div class="form-group">
                  <label class="form-label" for="department">部门</label>
                  <input type="text" id="department" name="department" class="form-input" placeholder="请输入所属部门" maxlength="50" value="市场部">
                </div>
              </div>
            </div>

            <!-- 联系方式 -->
            <div class="detail-section">
              <h4 class="detail-section-title">联系方式</h4>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="email">邮箱</label>
                  <input type="email" id="email" name="email" class="form-input" placeholder="请输入邮箱地址" value="zhang.wei@example.com">
                </div>
                <div class="form-group">
                  <label class="form-label" for="phone">办公电话</label>
                  <input type="tel" id="phone" name="phone" class="form-input" placeholder="请输入办公电话" maxlength="20" value="010-88889999">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="mobile">手机</label>
                  <input type="tel" id="mobile" name="mobile" class="form-input" placeholder="请输入手机号" maxlength="20" value="13800138001">
                </div>
                <div class="form-group">
                  <label class="form-label" for="website">公司网址</label>
                  <input type="url" id="website" name="website" class="form-input" placeholder="请输入公司网址" value="www.example.com">
                </div>
              </div>
            </div>

            <!-- 公司信息 -->
            <div class="detail-section">
              <h4 class="detail-section-title">公司信息</h4>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="company">公司名称</label>
                  <input type="text" id="company" name="company" class="form-input" placeholder="请输入公司名称" maxlength="100" value="北京科技有限公司">
                </div>
                <div class="form-group">
                  <label class="form-label" for="industry">所属行业</label>
                  <select id="industry" name="industry" class="form-select">
                    <option value="">请选择行业</option>
                    <option value="科技/互联网" selected>科技/互联网</option>
                    <option value="制造业">制造业</option>
                    <option value="贸易/零售">贸易/零售</option>
                    <option value="金融/保险">金融/保险</option>
                    <option value="医疗/健康">医疗/健康</option>
                    <option value="教育/培训">教育/培训</option>
                    <option value="其他">其他</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- 线索信息 -->
            <div class="detail-section">
              <h4 class="detail-section-title">线索信息</h4>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="source">线索来源</label>
                  <select id="source" name="source" class="form-select">
                    <option value="">请选择来源</option>
                    <option value="网站" selected>网站</option>
                    <option value="电话">电话</option>
                    <option value="推荐">推荐</option>
                    <option value="活动">活动</option>
                    <option value="其他">其他</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label" for="status">线索状态</label>
                  <select id="status" name="status" class="form-select">
                    <option value="新建" selected>新建</option>
                    <option value="已联系">已联系</option>
                    <option value="有意向">有意向</option>
                    <option value="已评估">已评估</option>
                    <option value="已转换">已转换</option>
                    <option value="已关闭">已关闭</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="rating">线索评级</label>
                  <select id="rating" name="rating" class="form-select">
                    <option value="">请选择评级</option>
                    <option value="Hot" selected>Hot（高意向）</option>
                    <option value="Warm">Warm（中意向）</option>
                    <option value="Cold">Cold（低意向）</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label" for="assignedTo">负责人</label>
                  <select id="assignedTo" name="assignedTo" class="form-select">
                    <option value="管理员" selected>管理员（本人）</option>
                    <option value="销售员 A">销售员 A</option>
                    <option value="销售员 B">销售员 B</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="address">地址</label>
                <input type="text" id="address" name="address" class="form-input" placeholder="请输入详细地址" maxlength="255" value="北京市朝阳区科技园 A 座 101 室">
              </div>
              <div class="form-group">
                <label class="form-label" for="description">描述</label>
                <textarea id="description" name="description" class="form-textarea" placeholder="请输入备注信息">客户通过官网表单提交咨询，对 CRM 系统有兴趣，需要安排演示。</textarea>
              </div>
            </div>

            <!-- 表单按钮 -->
            <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px;">
              <button type="button" class="btn btn-default" onclick="handleCancel()">取消</button>
              <button type="submit" class="btn btn-primary">保存</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('editLeadForm').addEventListener('submit', function(e) {
      e.preventDefault();

      if (!validateForm(this)) {
        showMessage('请检查并填写必填项', 'error');
        return;
      }

      // 模拟保存
      showMessage('线索更新成功！');

      // 延迟跳转到详情页
      setTimeout(() => {
        window.location.href = 'detail.html?id=1';
      }, 1000);
    });

    function handleCancel() {
      if (confirm('确定要取消编辑吗？未保存的修改将丢失。')) {
        window.location.href = 'detail.html?id=1';
      }
    }
  </script>
</body>
</html>
